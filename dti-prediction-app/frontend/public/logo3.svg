<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Drug (simple node) -->
  <circle cx="60" cy="100" r="12" fill="#14B8A6"></circle>

  <!-- Protein (wave-like curve) -->
  <path d="M120 60 
           Q150 80 120 100 
           Q90 120 120 140" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round"></path>

  <!-- Interaction line -->
  <line x1="72" y1="100" x2="110" y2="100" stroke="#F59E0B" stroke-width="3"></line>

  <!-- Binding point -->
  <circle cx="110" cy="100" r="5" fill="#F59E0B"></circle>

</svg>